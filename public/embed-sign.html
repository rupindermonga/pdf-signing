<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Document</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #f8fafd; }
    .boot-container { max-width: 480px; margin: 80px auto; padding: 24px; text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e0e4ec; border-top-color: #1a3b7a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { background: #ffebee; border: 1px solid #ef5350; color: #c62828; padding: 14px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="boot-container">
    <div id="loading">
      <div class="spinner"></div>
      <p style="color:#666;">Loading signing session...</p>
    </div>
    <div id="error" class="error" style="display:none;"></div>
  </div>

  <script>
    // Extract embed token from path
    const embedToken = window.location.pathname.split('/embed/sign/')[1];

    async function bootstrap() {
      try {
        const resp = await fetch('/api/embed/sign/' + embedToken + '/bootstrap');
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          throw new Error(data.error || 'Session expired or invalid');
        }
        const { signerToken } = await resp.json();
        // Redirect the iframe to the regular signing page with the real signer token.
        // This works because the embed route already set frame-ancestors to allow the parent origin,
        // and the signing page's CSP will be inherited by this navigation within the same domain.
        window.location.replace('/sign/' + signerToken);
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        const e = document.getElementById('error');
        e.textContent = err.message;
        e.style.display = 'block';
      }
    }

    bootstrap();
  </script>
</body>
</html>
