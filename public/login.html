<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocSeal - Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/i18n.js" defer></script>
  <style>
    .login-container { max-width: 420px; margin: 80px auto; padding: 0 20px; }
    .login-card { background: white; border-radius: 16px; padding: 36px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
    .login-card .logo-big { font-size: 40px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
    .login-card .logo-big .ld { color: #1a3b7a; } .login-card .logo-big .ls { color: #2d5db8; font-weight: 600; }
    .login-card h2 { color: #333; font-size: 18px; font-weight: 400; margin-bottom: 28px; }
    .login-card .form-group { text-align: left; margin-bottom: 16px; }
    .login-card .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    .login-card .form-group input { width: 100%; padding: 12px 14px; border: 1px solid #d0d5dd; border-radius: 8px; font-size: 15px; }
    .login-card .form-group input:focus { outline: none; border-color: #1a3b7a; box-shadow: 0 0 0 3px rgba(26,59,122,0.1); }
    .login-card .btn-primary { width: 100%; padding: 14px; font-size: 16px; margin-top: 8px; }
    .otp-section { display: none; }
    .otp-section.show { display: block; }
    .otp-input { text-align: center !important; font-size: 28px !important; letter-spacing: 8px; font-weight: 700; color: #1a3b7a; }
    .dev-otp { background: #fff8e1; border: 1px solid #ffa000; border-radius: 8px; padding: 10px; margin: 12px 0; font-size: 13px; color: #e65100; }
    .error-msg { background: #ffebee; border: 1px solid #ef5350; border-radius: 8px; padding: 10px; margin: 12px 0; font-size: 13px; color: #c62828; display: none; }
    .error-msg.show { display: block; }
    .links { margin-top: 20px; font-size: 13px; color: #888; }
    .links a { color: #1a3b7a; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo-big"><span class="ld">Doc</span><span class="ls">Seal</span></div>
      <h2 data-i18n="login.title">Sign in to DocSeal</h2>

      <div id="email-section">
        <div class="form-group">
          <label data-i18n="common.email">Email address</label>
          <input type="email" id="email" data-i18n-placeholder="login.email_placeholder" placeholder="you@example.com" autofocus>
        </div>
        <div class="form-group">
          <label data-i18n="common.name">Your name</label>
          <input type="text" id="name" data-i18n-placeholder="login.name_placeholder" placeholder="John Doe">
        </div>
        <button class="btn-primary" id="send-otp-btn" data-i18n="login.send_code">Continue</button>
      </div>

      <div id="otp-section" class="otp-section">
        <p style="color:#666;font-size:14px;margin-bottom:16px;"><span data-i18n="sign.enter_code_to">Enter the 6-digit code sent to</span> <strong id="sent-to"></strong></p>
        <div class="form-group">
          <input type="text" id="otp" class="otp-input" maxlength="6" data-i18n-placeholder="login.code_placeholder" placeholder="------">
        </div>
        <div id="dev-otp" class="dev-otp" style="display:none;"></div>
        <button class="btn-primary" id="verify-btn" data-i18n="login.verify">Verify &amp; Login</button>
        <p style="margin-top:12px;"><a href="#" id="back-btn" style="color:#1a3b7a;font-size:13px;" data-i18n="common.back">Use different email</a></p>
      </div>

      <div id="error" class="error-msg"></div>

      <div class="links">
        <a href="/verify" data-i18n="common.verify">Verify a document</a> &middot; <a href="/compliance">Privacy &amp; PIPEDA</a>
      </div>
    </div>
  </div>

  <script>
    const emailInput = document.getElementById('email');
    const nameInput = document.getElementById('name');
    const otpInput = document.getElementById('otp');
    const sendBtn = document.getElementById('send-otp-btn');
    const verifyBtn = document.getElementById('verify-btn');
    const errorDiv = document.getElementById('error');
    const emailSection = document.getElementById('email-section');
    const otpSection = document.getElementById('otp-section');
    const devOtpDiv = document.getElementById('dev-otp');

    function showError(msg) { errorDiv.textContent = msg; errorDiv.classList.add('show'); }
    function hideError() { errorDiv.classList.remove('show'); }

    sendBtn.addEventListener('click', async () => {
      hideError();
      const email = emailInput.value.trim();
      if (!email) return showError('Please enter your email.');
      sendBtn.disabled = true; sendBtn.textContent = 'Sending...';

      try {
        const resp = await fetch('/api/auth/send-otp', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error);

        document.getElementById('sent-to').textContent = email;
        emailSection.style.display = 'none';
        otpSection.classList.add('show');
        otpInput.focus();

        if (data.devOtp) {
          devOtpDiv.style.display = 'block';
          devOtpDiv.textContent = '';
          devOtpDiv.appendChild(document.createTextNode('Email not configured. Your code: '));
          const strong = document.createElement('strong');
          strong.style.cssText = 'font-size:18px;letter-spacing:3px;';
          strong.textContent = data.devOtp;
          devOtpDiv.appendChild(strong);
        }
      } catch (err) { showError(err.message); }
      sendBtn.disabled = false; sendBtn.textContent = 'Continue';
    });

    verifyBtn.addEventListener('click', async () => {
      hideError();
      const code = otpInput.value.trim();
      if (code.length !== 6) return showError('Enter the 6-digit code.');
      verifyBtn.disabled = true; verifyBtn.textContent = 'Verifying...';

      try {
        const resp = await fetch('/api/auth/verify-otp', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailInput.value.trim(), code, name: nameInput.value.trim() })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error);
        const redirect = data.redirect;
        // Prevent open redirect — only allow same-origin paths
        if (redirect && redirect.startsWith('/') && !redirect.startsWith('//')) {
          window.location.href = redirect;
        } else {
          window.location.href = '/dashboard';
        }
      } catch (err) { showError(err.message); }
      verifyBtn.disabled = false; verifyBtn.textContent = 'Verify & Login';
    });

    document.getElementById('back-btn').addEventListener('click', (e) => {
      e.preventDefault();
      otpSection.classList.remove('show');
      emailSection.style.display = 'block';
      devOtpDiv.style.display = 'none';
      hideError();
    });

    // Enter key support
    emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendBtn.click(); });
    otpInput.addEventListener('keydown', e => { if (e.key === 'Enter') verifyBtn.click(); });
  </script>
</body>
</html>
